# ============================================================
# AI Tools Hub — Reverse Proxy Configuration
# ============================================================

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Landing Page ──────────────────────────────────────
    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # ── OpenClaw ──────────────────────────────────────────
    location /openclaw/ {
        proxy_pass http://openclaw:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ── Hermes Agent Dashboard ────────────────────────────
    location /hermes/ {
        proxy_pass http://hermes:9119/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        # Fix absolute paths in dashboard assets
        sub_filter 'src="/' 'src="/hermes/';
        sub_filter 'href="/' 'href="/hermes/';
        sub_filter "src='/" "src='/hermes/";
        sub_filter "href='/" "href='/hermes/";
        sub_filter_once off;
        sub_filter_types text/css application/javascript;
    }

    # ── Hermes API Server ─────────────────────────────────
    location /hermes-api/ {
        proxy_pass http://hermes:8642/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── OpenCode Web UI ───────────────────────────────────
    location /opencode/ {
        proxy_pass http://opencode:4096/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ── ttyd Web Terminal ─────────────────────────────────
    # Trailing slashes on BOTH sides are critical for ttyd
    location /terminal/ {
        proxy_pass http://terminal:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        # Increase timeouts for long-lived terminal sessions
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
