# ============================================================
# tmux configuration — AI Tools Terminal
# ============================================================

# ── General ──────────────────────────────────────────────
set-option -g default-terminal "tmux-256color"
set-option -g history-limit 200000
set-option -g remain-on-exit on
set-option -g escape-time 0
set-option -g focus-events on

# ── Mouse support ────────────────────────────────────────
set-option -g mouse on

# ── Prefix rebind (Ctrl+A) ───────────────────────────────
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# ── Split panes ──────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Window management ───────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind , command-prompt "rename-window '%%'"

# ── Status bar ───────────────────────────────────────────
set-option -g status-position top
set-option -g status-style "bg=#161b22,fg=#c9d1d9"
set-option -g status-left " #[fg=#58a6ff]#S "
set-option -g status-left-length 30
set-option -g status-right " #{?client_prefix,🔴,🟢}  %H:%M  "
set-option -g status-right-length 40

# Window list in status bar
set-option -g window-status-format " #I: #W "
set-option -g window-status-current-format " #[bg=#30363d]#I: #W#[bg=#161b22] "
set-option -g window-status-separator ""

# ── Copy mode (vi keys) ──────────────────────────────────
set-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# ── Reload config ────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded ✓"
